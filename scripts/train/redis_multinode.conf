# Multi-node Redis configuration
# Binds to the actual node hostname instead of localhost
bind 0.0.0.0
port 6379
daemonize no
loglevel notice
logfile ""
databases 16

save ""
stop-writes-on-bgsave-error no

maxmemory 2gb
maxmemory-policy allkeys-lfu
maxmemory-samples 10

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

appendonly no
activerehashing yes

# Allow connections from other nodes
protected-mode no