mongodb:
  enabled: true
  # For multi-node setup, MongoDB URL points to server node
  url: "mongodb://admin:${MONGODB_PASSWORD}@SERVER_NODE_PLACEHOLDER:27017/llm_caching?authSource=admin"
  database: "llm_caching"
  collection: "classification_logs"
  max_occurrences: 100000 
  worker_count: 4 


logging:
  level: "INFO" #INFO for debug           
  format: "json"       
  include_stdlib: true   
  file_logging:
    enabled: true
    error_file: "logs/errors.log"
    max_size: "100MB"
    rotate_count: 3


batching:
  max_batch_prompt_size: 32