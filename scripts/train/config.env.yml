mongodb:
  enabled: true
  url: "${MONGODB_URL}"
  database: "llm_caching"
  collection: "classification_logs"
  max_occurrences: 100000 
  worker_count: 4 

logging:
  level: "INFO"
  format: "json"       
  include_stdlib: true   
  file_logging:
    enabled: true
    error_file: "logs/errors.log"
    max_size: "100MB"
    rotate_count: 3

batching:
